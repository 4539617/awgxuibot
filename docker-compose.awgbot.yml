services:
  # AWGBot - AmneziaWG Management
  awgbot:
    build:
      context: .
      target: awgbot
    container_name: awgbot
    restart: always
    privileged: true
    volumes:
      - ./config.yaml:/app/config.yaml:ro  # Конфигурация (read-only)
      - ./logs:/app/logs
      - ./output:/app/output
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/amnezia:/opt/amnezia
      - ./users.db:/app/users.db:ro
      - ./settings.db:/app/settings.db:ro
    environment:
      - NODE_ENV=production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"