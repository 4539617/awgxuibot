version: '3.8'

# Этот файл запускает ОБА бота одновременно
# Для раздельного запуска используйте:
# - docker-compose.xuibot.yml (только XUIBot)
# - docker-compose.awgbot.yml (только AWGBot)

services:
  # AWGBot - AmneziaWG Management
  awgbot:
    build:
      context: .
      target: awgbot
    container_name: awgbot
    restart: unless-stopped
    privileged: true
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/amnezia:/opt/amnezia
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${AWG_BOT_TOKEN}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # XUIBot - User & VLESS Management
  xuibot:
    build:
      context: .
      target: xuibot
    container_name: xuibot
    restart: always
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - /etc/x-ui:/etc/x-ui:rw

