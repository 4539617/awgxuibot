services:
  # XUIBot - User & VLESS Management
  xuibot:
    build:
      context: .
      target: xuibot
    container_name: xuibot
    restart: always
    volumes:
      - ./config.yaml:/app/config.yaml:rw  # Конфигурация (read-write для переключения панелей)
      - ./logs:/app/logs
      - ./data:/app/data
      - /etc/x-ui:/etc/x-ui:rw  # Доступ к базе данных X-UI